name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: Run shellcheck on all shell scripts
        run: |
          shellcheck \
            activate.sh \
            deactivate.sh \
            doctor.sh \
            install.sh \
            self-update.sh \
            setup-global.sh \
            setup-aliases.sh \
            hooks/*.sh

      - name: Smoke test — project install
        run: |
          mkdir -p /tmp/test-project
          bash install.sh --project /tmp/test-project

          echo "Verifying installed structure..."
          test -d /tmp/test-project/.claude/agents
          test -d /tmp/test-project/.claude/skills
          test -d /tmp/test-project/.claude/commands
          test -d /tmp/test-project/.claude/alloy-hooks
          test -f /tmp/test-project/.claude/settings.json
          test -f /tmp/test-project/CLAUDE.md

          echo "Verifying file counts..."
          AGENT_COUNT=$(ls /tmp/test-project/.claude/agents/*.md 2>/dev/null | wc -l)
          SKILL_COUNT=$(find /tmp/test-project/.claude/skills -name "SKILL.md" 2>/dev/null | wc -l)
          COMMAND_COUNT=$(ls /tmp/test-project/.claude/commands/*.md 2>/dev/null | wc -l)
          HOOK_COUNT=$(ls /tmp/test-project/.claude/alloy-hooks/*.sh 2>/dev/null | wc -l)

          [ "$AGENT_COUNT" -eq 14 ] || { echo "Expected 14 agents, got $AGENT_COUNT"; exit 1; }
          [ "$SKILL_COUNT" -eq 8 ] || { echo "Expected 8 skills, got $SKILL_COUNT"; exit 1; }
          [ "$COMMAND_COUNT" -eq 14 ] || { echo "Expected 14 commands, got $COMMAND_COUNT"; exit 1; }
          [ "$HOOK_COUNT" -eq 19 ] || { echo "Expected 19 hooks, got $HOOK_COUNT"; exit 1; }

          echo "Verifying settings.json is valid JSON..."
          jq . /tmp/test-project/.claude/settings.json > /dev/null

          echo "Verifying manifest was created..."
          test -f /tmp/test-project/.claude/.alloy-manifest

          echo "Verifying project install creates .alloy-meta..."
          test -f /tmp/test-project/.claude/.alloy-meta || { echo "install.sh --project should create .alloy-meta"; exit 1; }
          jq . /tmp/test-project/.claude/.alloy-meta > /dev/null || { echo ".alloy-meta is not valid JSON"; exit 1; }
          PROJECT_META_MODE=$(jq -r '.install_mode' /tmp/test-project/.claude/.alloy-meta)
          [ "$PROJECT_META_MODE" = "copy" ] || { echo "Project install should be copy mode, got: $PROJECT_META_MODE"; exit 1; }

          echo "All smoke tests passed."

      - name: Smoke test — project cleanup
        run: |
          echo "Verifying project can be cleaned up..."
          rm -rf /tmp/test-project/.claude /tmp/test-project/CLAUDE.md

          test ! -d /tmp/test-project/.claude/agents
          test ! -f /tmp/test-project/CLAUDE.md

          echo "Project cleanup test passed."

      - name: Smoke test — global install and uninstall
        run: |
          echo "Testing global install..."
          bash install.sh
          test -d ~/.claude/agents
          test -d ~/.claude/alloy-hooks
          test -f ~/.claude/settings.json

          echo "Verifying global install creates manifest..."
          test -f ~/.claude/.alloy-manifest || { echo "install.sh should create .alloy-manifest"; exit 1; }

          echo "Verifying global install creates .alloy-meta..."
          test -f ~/.claude/.alloy-meta || { echo "install.sh should create .alloy-meta"; exit 1; }
          jq . ~/.claude/.alloy-meta > /dev/null || { echo ".alloy-meta is not valid JSON"; exit 1; }
          META_MODE=$(jq -r '.install_mode' ~/.claude/.alloy-meta)
          META_VER=$(jq -r '.version' ~/.claude/.alloy-meta)
          REPO_VER=$(cat VERSION)
          [ "$META_VER" = "$REPO_VER" ] || { echo "Meta version mismatch: $META_VER vs $REPO_VER"; exit 1; }
          [ "$META_MODE" = "copy" ] || { echo "Global install should be copy mode, got: $META_MODE"; exit 1; }

          echo "Testing global --uninstall..."
          bash install.sh --uninstall
          test ! -f ~/.claude/agents/steel.md
          test ! -d ~/.claude/alloy-hooks
          test ! -d ~/.claude/agent-memory
          test ! -f ~/.claude/.alloy-meta || { echo ".alloy-meta should be removed after uninstall"; exit 1; }
          test ! -f ~/.claude/.alloy-manifest || { echo ".alloy-manifest should be removed after uninstall"; exit 1; }

          echo "Global install/uninstall test passed."

      - name: Smoke test — global activate/deactivate roundtrip
        run: |
          mkdir -p ~/.claude

          echo "Testing activate..."
          bash activate.sh

          test -f ~/.claude/settings.json
          test -d ~/.claude/agents
          test -d ~/.claude/alloy-hooks
          test -f ~/.claude/.alloy-manifest
          jq . ~/.claude/settings.json > /dev/null

          echo "Testing --version flag..."
          VERSION_OUTPUT=$(bash activate.sh --version)
          echo "$VERSION_OUTPUT" | grep -qE "claude-alloy.*[0-9]+\.[0-9]+\.[0-9]+" || { echo "Version output missing semver: $VERSION_OUTPUT"; exit 1; }

          echo "Testing --check flag..."
          bash activate.sh --check --verbose || { echo "activate.sh --check failed after clean install"; exit 1; }

          echo "Testing .alloy-meta content..."
          test -f ~/.claude/.alloy-meta
          jq . ~/.claude/.alloy-meta > /dev/null
          META_MODE=$(jq -r '.install_mode' ~/.claude/.alloy-meta)
          META_VER=$(jq -r '.version' ~/.claude/.alloy-meta)
          REPO_VER=$(cat VERSION)
          [ "$META_MODE" = "symlink" ] || [ "$META_MODE" = "copy" ] || { echo "Invalid install_mode: $META_MODE"; exit 1; }
          [ "$META_VER" = "$REPO_VER" ] || { echo "Meta version mismatch: $META_VER vs $REPO_VER"; exit 1; }

          echo "Testing doctor.sh pass path (verbose)..."
          bash doctor.sh --verbose || { echo "doctor.sh failed after fresh install"; exit 1; }

          echo "Testing doctor.sh pass path (non-verbose)..."
          SUMMARY=$(bash doctor.sh 2>&1)
          echo "$SUMMARY" | grep -q "alloy doctor:" || { echo "Missing summary line in non-verbose mode"; exit 1; }

          echo "Testing doctor.sh fail path..."
          rm -f ~/.claude/agents/steel.md
          bash doctor.sh 2>&1 && { echo "Expected doctor.sh to fail with missing agent"; exit 1; } || true
          bash activate.sh > /dev/null 2>&1

          echo "Testing customized file backup..."
          echo "# my custom content" > ~/.claude/agents/steel.md
          bash activate.sh > /dev/null 2>&1
          test -f ~/.claude/agents/steel.md.user-backup || { echo "Expected .user-backup to be created"; exit 1; }

          echo "Testing copy-fallback path (simulated WSL)..."
          bash deactivate.sh > /dev/null 2>&1
          WSL_DISTRO_NAME=Ubuntu bash activate.sh > /dev/null 2>&1
          test ! -L ~/.claude/agents/steel.md || { echo "Expected copy, got symlink in WSL mode"; exit 1; }
          test -f ~/.claude/agents/steel.md || { echo "steel.md missing in copy mode"; exit 1; }

          echo "Testing deactivate..."
          bash deactivate.sh

          test ! -d ~/.claude/agents || [ -z "$(ls -A ~/.claude/agents 2>/dev/null)" ]
          test ! -f ~/.claude/.alloy-meta || { echo ".alloy-meta should be removed after deactivate"; exit 1; }
          test ! -f ~/.claude/.alloy-manifest || { echo ".alloy-manifest should be removed after deactivate"; exit 1; }

          echo "Roundtrip test passed."
